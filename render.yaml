services:
  - type: web
    name: uacpv3-control-plane
    runtime: node
    rootDir: .
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: USER_EMAIL
        value: founder@company.com
      - key: CONTACT_EMAIL
        value: founder@company.com
      - key: GEMINI_API_KEY
        sync: false
      - key: UACP_ADMIN_KEY
        sync: false
      - key: UACP_INTERNAL_API_KEY
        sync: false
      - key: DEFAULT_RESEARCH_QUERY
        value: ai governance orchestration workflow observability api mcp deployment compliance
